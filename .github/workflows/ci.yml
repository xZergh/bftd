name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  mutation:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Stryker mutation tests
        run: npm run ci:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: mutation-report
          path: artifacts/mutation/**
          if-no-files-found: warn

  fast-checks:
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/feature/')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI_SKIP_ALLURE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run ci:typecheck

      - name: ESLint
        run: npm run ci:lint

      - name: Architecture boundaries
        run: npm run ci:architecture:boundaries

      - name: Unit and integration tests
        run: npm run ci:test

      - name: GraphQL schema contract check
        run: npm run ci:schema:check

      - name: Upload test artifacts
        if: always()
        # NOTE: GitHub currently reports a Node 20 deprecation warning for this action.
        # This warning is expected until actions/upload-artifact ships a Node 24 runtime.
        # We keep this step enabled for CI diagnostics (JUnit and other test artifacts).
        uses: actions/upload-artifact@v5
        with:
          name: test-artifacts-fast
          path: |
            artifacts/junit.xml
            artifacts/coverage/**
          if-no-files-found: warn

  hardening:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run ci:typecheck

      - name: ESLint
        run: npm run ci:lint

      - name: Architecture boundaries
        run: npm run ci:architecture:boundaries

      - name: Unit and integration tests
        run: npm run ci:test

      - name: Setup Java (Allure CLI)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Generate Allure HTML report
        if: always()
        run: npm run allure:generate

      - name: Migration check (fresh)
        run: npm run ci:migration:fresh

      - name: Migration check (upgrade path)
        run: npm run ci:migration:upgrade

      - name: GraphQL schema contract check
        run: npm run ci:schema:check

      - name: Security and quality checks (non-blocking policy)
        run: npm run ci:security:nonblocking

      - name: Upload test artifacts
        if: always()
        # NOTE: GitHub currently reports a Node 20 deprecation warning for this action.
        # This warning is expected until actions/upload-artifact ships a Node 24 runtime.
        # We keep this step enabled for CI diagnostics (JUnit and other test artifacts).
        uses: actions/upload-artifact@v5
        with:
          name: test-artifacts-hardening
          path: |
            artifacts/junit.xml
            artifacts/coverage/**
            artifacts/allure-results/**
            artifacts/allure-report/**
            docs/reports/allure-report.html
          if-no-files-found: warn
