name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  pull_request:

jobs:
  hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run ci:typecheck

      - name: Unit and integration tests
        run: npm run ci:test

      - name: Migration check (fresh)
        run: npm run ci:migration:fresh

      - name: Migration check (upgrade path)
        run: npm run ci:migration:upgrade

      - name: GraphQL schema contract check
        run: npm run ci:schema:check

      - name: Security and quality checks (non-blocking policy)
        run: npm run ci:security:nonblocking

      - name: Upload test artifacts
        if: always()
        # NOTE: GitHub currently reports a Node 20 deprecation warning for this action.
        # This warning is expected until actions/upload-artifact ships a Node 24 runtime.
        # We keep this step enabled for CI diagnostics (JUnit and other test artifacts).
        uses: actions/upload-artifact@v5
        with:
          name: test-artifacts
          path: |
            artifacts/junit.xml
            coverage/**
            allure-results/**
            allure-report/**
          if-no-files-found: warn
