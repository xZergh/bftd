"""ISO-8601 calendar date (YYYY-MM-DD)"""
scalar Date

"""ISO-8601 timestamp"""
scalar DateTime

type AppError {
  code: String!
  message: String!
  fixHint: String!
  context: String
}

type Project {
  id: ID!
  key: String!
  name: String!
  isArchived: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type Requirement {
  id: ID!
  projectId: ID!
  externalKey: String!
  title: String!
  description: String
  releaseLabel: String
  sprintLabel: String
  requirementType: String
  status: String
  priority: String
  tags: [String!]!
  parentRequirementId: ID
  createdAt: DateTime!
  updatedAt: DateTime!
}

type TestCaseStep {
  id: ID!
  testCaseId: ID!
  stepOrder: Int!
  name: String!
  expectedResult: String
  sourceStepId: String
  parentStepId: String
  metaJson: String
}

type TestCase {
  id: ID!
  projectId: ID!
  type: String!
  title: String!
  externalId: String
  releaseLabel: String
  sprintLabel: String
  isDeleted: Boolean!
  deletedAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
  steps: [TestCaseStep!]!
}

type TestRun {
  id: ID!
  projectId: ID!
  name: String!
  releaseLabel: String
  sprintLabel: String
  environment: String
  buildVersion: String
  trigger: String
  createdAt: DateTime!
  finishedAt: DateTime
}

type ResultAttachment {
  kind: String!
  ref: String!
}

type TestResult {
  id: ID!
  runId: ID!
  testCaseId: ID!
  status: String!
  durationMs: Int!
  attachments: [ResultAttachment!]!
  createdAt: DateTime!
}

type TestRunDetail {
  run: TestRun!
  results: [TestResult!]!
}

type RunAggregate {
  runId: ID!
  total: Int!
  passed: Int!
  failed: Int!
  skipped: Int!
  blocked: Int!
  passRatePct: Float!
  durationMs: Int!
}

type TraceabilityEdge {
  requirementId: ID!
  manualTestCaseId: ID!
  automatedTestCaseId: ID
}

type RunTraceabilityReport {
  runId: ID!
  projectId: ID!
  capturedAt: String!
  edges: [TraceabilityEdge!]!
}

type ProjectSummary {
  totalRequirements: Int!
  totalManualCases: Int!
  totalAutomatedCases: Int!
}

type ImportErrorItem {
  index: Int!
  code: String!
  message: String!
  fixHint: String!
}

type ImportWarningItem {
  index: Int!
  message: String!
}

type ImportRequirementsResult {
  createdCount: Int!
  updatedCount: Int!
  skippedCount: Int!
  errors: [ImportErrorItem!]!
  warnings: [ImportWarningItem!]!
}

type ImportAutomatedFromTrrResult {
  createdCount: Int!
  updatedCount: Int!
  skippedCount: Int!
  errors: [ImportErrorItem!]!
}

type CoverageFormulaInfo {
  formulaId: String!
  label: String!
  description: String!
  numeratorLabel: String!
  denominatorLabel: String!
  expression: String!
  scope: String!
}

type CoverageMetricValue {
  formulaId: String!
  valuePct: Float!
  numerator: Int!
  denominator: Int!
}

type KpiCurrent {
  totalRequirements: Int!
  totalManualCases: Int!
  totalTestRuns: Int!
  requirementsWithManualLinks: Int!
  requirementsWithAutomatedLinksViaManual: Int!
  automatedCasesReachableFromRequirements: Int!
  orphanManualCases: Int!
  orphanAutomatedCases: Int!
  coverage: [CoverageMetricValue!]!
}

type KpiRunPoint {
  runId: ID!
  runStartedAt: String!
  totalTests: Int!
  passed: Int!
  failed: Int!
  skipped: Int!
  blocked: Int!
  passRatePct: Float!
}

type KpiDailyPoint {
  date: String!
  coverage: [CoverageMetricValue!]!
  totalTestRuns: Int!
}

type KpiDashboard {
  projectId: ID!
  generatedAt: String!
  coverageFormulaInfo: [CoverageFormulaInfo!]!
  current: KpiCurrent!
  perRun: [KpiRunPoint!]!
  dailyTrend: [KpiDailyPoint!]!
}

type RecalculateKpiResult {
  projectId: ID!
  fromDate: String
  toDate: String
  projectSnapshotsUpdated: Int!
  runSnapshotsUpdated: Int!
  dailySnapshotsUpdated: Int!
  completedAt: String!
}

type RequirementDesignLink {
  id: ID!
  projectId: ID!
  requirementId: ID!
  provider: String!
  designProjectId: String
  designFileId: String
  designPageId: String
  designNodeId: String
  shareUrl: String!
  title: String
  lastSyncedAt: String
}

type RequirementDesignLinkPayload {
  link: RequirementDesignLink
  error: AppError
}

type UnlinkResult {
  success: Boolean!
}

type ImportRequirementDesignLinksResult {
  createdCount: Int!
  updatedCount: Int!
  skippedCount: Int!
  errors: [ImportErrorItem!]!
}

type TestCaseVersionStep {
  id: ID!
  versionId: ID!
  stepOrder: Int!
  name: String!
  expectedResult: String
  parentStepId: String
  sourceStepId: String
  metaJson: String
}

type TestCaseVersion {
  id: ID!
  testCaseId: ID!
  versionSeq: Int!
  createdAt: DateTime!
  title: String!
  type: String!
  externalId: String
  releaseLabel: String
  sprintLabel: String
  isTombstone: Boolean!
  requirementIds: [ID!]!
  manualTestCaseIds: [ID!]!
  steps: [TestCaseVersionStep!]!
}

type LinkMutationResult {
  linked: Boolean!
}

type DeleteTestCaseResult {
  success: Boolean!
  tombstoned: Boolean
}

input ManualStepInput {
  name: String!
  expectedResult: String
}

input CreateProjectInput {
  name: String!
  key: String
}

input CreateRequirementInput {
  projectId: ID!
  externalKey: String!
  title: String!
  description: String
  releaseLabel: String
  sprintLabel: String
  requirementType: String
  status: String
  priority: String
  tags: [String!]
  parentRequirementId: ID
}

input CreateManualTestCaseInput {
  projectId: ID!
  title: String!
  requirementIds: [ID!]!
  steps: [ManualStepInput!]!
  releaseLabel: String
  sprintLabel: String
}

input CreateAutomatedTestCaseInput {
  projectId: ID!
  title: String!
  manualTestCaseIds: [ID!]!
  releaseLabel: String
  sprintLabel: String
}

input CreateTestRunInput {
  projectId: ID!
  name: String!
  releaseLabel: String
  sprintLabel: String
  environment: String
