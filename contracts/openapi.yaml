openapi: 3.0.3
info:
  title: TCMS API
  description: |
    Test Case Management System — **GraphQL** API over HTTP.

    - **Primary endpoint:** `POST /graphql` with JSON body (`query`, optional `variables`, `operationName`).
    - **Schema:** SDL snapshot at `contracts/graphql-schema.snapshot.graphql` (run `npm run ci:schema:update` after schema changes).
    - **Breaking changes:** document in `docs/BREAKING_CHANGES.md`.
  version: 1.0.0
  license:
    name: ISC
    identifier: ISC

servers:
  - url: /
    description: Default (e.g. http://localhost:4000)

tags:
  - name: GraphQL
    description: Single GraphQL endpoint (queries & mutations).
  - name: Documentation
    description: OpenAPI and Swagger UI.

paths:
  /graphql:
    post:
      tags: [GraphQL]
      summary: GraphQL operation
      description: |
        Execute a GraphQL query or mutation. No auth in MVP (local / trusted network).

        Example (introspection disabled in production by policy — use schema snapshot or tooling):
        ```json
        { "query": "{ projects { id name key } }" }
        ```
      operationId: graphqlPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphQLRequest"
          application/graphql:
            schema:
              type: string
              description: Raw GraphQL document (optional; prefer JSON body).
      responses:
        "200":
          description: GraphQL response (data and/or errors)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphQLResponse"
        "400":
          description: Bad request (malformed body)
        "500":
          description: Server error

    get:
      tags: [GraphQL]
      summary: GraphQL over GET (if enabled)
      description: Some servers allow query via query string; Yoga defaults may vary. Prefer POST.
      parameters:
        - name: query
          in: query
          schema:
            type: string
      responses:
        "200":
          description: GraphQL response

  /openapi.yaml:
    get:
      tags: [Documentation]
      summary: OpenAPI 3 document (this file)
      responses:
        "200":
          description: YAML document
          content:
            application/yaml:
              schema:
                type: string

  /api-docs:
    get:
      tags: [Documentation]
      summary: Swagger UI
      description: Interactive API documentation (browser).
      responses:
        "200":
          description: HTML page loading Swagger UI

components:
  schemas:
    GraphQLRequest:
      type: object
      properties:
        query:
          type: string
          description: GraphQL query or mutation document
        variables:
          type: object
          additionalProperties: true
        operationName:
          type: string
      required: [query]

    GraphQLResponse:
      type: object
      properties:
        data:
          type: object
          additionalProperties: true
        errors:
          type: array
          items:
            type: object
            properties:
              message:
                type: string
              locations:
                type: array
              path:
                type: array
              extensions:
                type: object
